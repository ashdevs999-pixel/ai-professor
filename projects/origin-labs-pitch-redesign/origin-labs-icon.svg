<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="turquoise-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#40E0D0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2DD4BF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Human circle (left) - transparent, represents human -->
  <circle cx="28" cy="40" r="20" fill="none" stroke="url(#turquoise-grad)" stroke-width="3" opacity="0.6"/>
  <!-- AI circle (right) - black, represents AI/technology -->
  <circle cx="52" cy="40" r="20" fill="none" stroke="#000000" stroke-width="3"/>
  <!-- Connection point - turquoise dot with black center -->
  <circle cx="40" cy="40" r="6" fill="url(#turquoise-grad)"/>
  <circle cx="40" cy="40" r="3" fill="#000000"/>
</svg>
